version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pocketsmart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pocketsmart_user
      POSTGRES_PASSWORD: pocketsmart_password_secure_12345
      POSTGRES_DB: pocketsmart
    ports:
      - '5432:5432'
    volumes:
      - ./db/postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pocketsmart_user -d pocketsmart']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocketsmart-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://pocketsmart_user:pocketsmart_password_secure_12345@postgres:5432/pocketsmart
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
